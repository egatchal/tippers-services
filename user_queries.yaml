# -- Users only connect to <= 3 unique rooms and whose first and last connections span less than 3 weeks 
visitor_less_3_rooms_3_weeks_query:
  label: VISITOR
  query: |
    WITH total_sessions AS (
    SELECT * 
    FROM user_location_trajectory_FINE_V2
    WHERE user IN ({users_str})
    ),
    unique_rooms as (
        select user, count(distinct space_id) as count
        from total_sessions
        group by user
    ), 
    last_time as (
        SELECT user, MAX(DATE(end)) as timeStamp
        FROM total_sessions 
        group by user
    ),
    start_time as (
        SELECT user, MIN(DATE(beginning)) as timeStamp
        FROM total_sessions 
        group by user
    ),
    connected_difference as (
        SELECT s.user, DATEDIFF(l.timeStamp, s.timeStamp) AS days_between
        FROM start_time s
        JOIN last_time l ON s.user = l.user
        group by user
    )
    select *
    from connected_difference c  
    JOIN unique_rooms u ON c.user = u.user
    where c.days_between <= 21 AND u.count <= 3; 
  index: user
  columns: ["days_between"]

# -- Users have connected to less than or equal to 3 unique days between first and last connections 
visitor_less_3_unique_days_query:
  label: VISITOR
  query: |
    WITH payload_bounds AS (
    SELECT 
        payload,
        MIN(DATE(timeStamp)) AS start_date,
        MAX(DATE(timeStamp)) AS end_date
    FROM observation_merged
    WHERE payload IN ({users_str})
    GROUP BY payload
    ),
    payload_day_counts AS (
        SELECT 
            o.payload,
            COUNT(DISTINCT DATE(o.timeStamp)) AS connected_days
        FROM observation_merged o
        JOIN payload_bounds pb ON o.payload = pb.payload
        WHERE DATE(o.timeStamp) BETWEEN pb.start_date AND pb.end_date
        GROUP BY o.payload
    )
    SELECT * 
    FROM payload_day_counts
    WHERE connected_days <= 3;
  index: payload
  columns: ["connected_days"]

# -- ≥ 80% of total connections are to COMMON rooms ("elevator", "rest room", "kitchen", "conference room", "meeting room" ) and ≤ 10% to RESIDENTIAL rooms ("office", "student lab")
visitor_common_rooms_query: 
  label: VISITOR
  query: |
    WITH total_sessions AS (
    SELECT * 
    FROM user_location_trajectory_FINE_V2
    WHERE user IN ({users_str})
    ),
    total_session_count AS (
        SELECT user, COUNT(*) AS total_count
        FROM total_sessions
        GROUP BY user
    ),
    valid_room_sessions AS (
        SELECT 
            t.user,
            t.space_id, 
            t.beginning, 
            t.end, 
            sm.type AS type
        FROM total_sessions t
        JOIN space s ON t.space_id = s.space_id 
        JOIN space_metadata sm ON sm.building_room = s.building_room
        WHERE sm.type IN (
            'conference room', 'office', 'meeting room', 
            'student lab', 'elevator', 'janitor', 
            'kitchen', 'rest room', 'telecom'
        )
    ),
    room_type_counts AS (
        SELECT 
            v.user,
            SUM(CASE WHEN v.type IN ('elevator', 'rest room', 'kitchen', 'conference room', 'meeting room') THEN 1 ELSE 0 END) * 1.0 
                / t.total_count AS common_room_percentage,
            SUM(CASE WHEN v.type IN ('office', 'student lab') THEN 1 ELSE 0 END) * 1.0 
                / t.total_count AS residential_room_percentage
        FROM valid_room_sessions v
        JOIN total_session_count t ON v.user = t.user
        GROUP BY v.user, t.total_count
    )
    SELECT * 
    FROM room_type_counts
    WHERE common_room_percentage >= 0.8
      AND residential_room_percentage <= 0.1;
  index: user
  columns: ["common_room_percentage", "residential_room_percentage"]

# -- >= 80 % of connections to Faculty Room (Works in MySQL)
faculty_room_query: 
  label: FACULTY
  query: |
    WITH total_count AS (
    SELECT user, COUNT(*) AS total
    FROM user_location_trajectory_FINE_V2
    WHERE user IN ({users_str})
    GROUP BY user
    ),
    space_count AS (
        SELECT 
            u.user, 
            s.building_room, 
            COUNT(*) AS count
        FROM user_location_trajectory_FINE_V2 u
        JOIN space s ON u.space_id = s.space_id
        WHERE user IN ({users_str})
        GROUP BY u.user, s.building_room
    ),
    qualified_rooms AS (
        SELECT 
            sc.user,
            sc.count, 
            tc.total
        FROM space_count sc
        JOIN total_count tc ON sc.user = tc.user
        JOIN faculty_data f ON sc.building_room = f.office
        WHERE sc.count * 1.0 / tc.total >= 0.8
    )
    SELECT *
    FROM qualified_rooms;
  index: user
  columns: ["count", "total"]

# -- Multiple hour duration (>= 2 hours) connections in faculty room types (conference room, meeting room, office) for >= 60% of time (Works in MySQL)
faculty_multiple_hour_duration_query:
    label: FACULTY
    query: |
        WITH total_sessions AS (
        SELECT * 
        FROM user_location_trajectory_FINE_V2
        WHERE user IN ({users_str})
        ),
        total_duration AS (
            SELECT user, SUM(TIMESTAMPDIFF(SECOND, beginning, end)) AS total_seconds
            FROM total_sessions
            GROUP BY user
        ),
        valid_room_sessions AS (
            SELECT 
                t.user,
                t.space_id, 
                t.beginning, 
                t.end, 
                sm.type AS type
            FROM total_sessions t
            JOIN space s ON t.space_id = s.space_id 
            JOIN space_metadata sm ON sm.building_room = s.building_room
            WHERE sm.type IN (
                'conference room', 'office', 'meeting room', 
                'student lab', 'elevator', 'janitor', 
                'kitchen', 'rest room', 'telecom'
            )
        ),
        faculty_room_sessions AS (
            SELECT * 
            FROM valid_room_sessions
            WHERE type IN ('office', 'conference room', 'meeting room')
        ),
        long_faculty_sessions AS (
            SELECT 
                user,
                SUM(TIMESTAMPDIFF(SECOND, beginning, end)) AS long_seconds
            FROM faculty_room_sessions
            WHERE TIMESTAMPDIFF(SECOND, beginning, end) >= 7200
            GROUP BY user
        ),
        qualified_users AS (
            SELECT 
                td.user, td.total_seconds, lfs.long_seconds
            FROM total_duration td
            JOIN long_faculty_sessions lfs ON td.user = lfs.user
            WHERE lfs.long_seconds * 1.0 / td.total_seconds >= 0.6
        )
        SELECT *
        FROM qualified_users;
    index: user
    columns: ["total_seconds", "long_seconds"]

# -- On ≥ 80% of all connected days, the last connection of the day ends between 5:00 PM and 8:00 PM (Works)
faculty_last_connection_query: 
    label: FACULTY
    query: |
        WITH total_sessions AS (
        SELECT * 
        FROM user_location_trajectory_FINE_V2
        WHERE user IN ({users_str})
        ),
        total_days AS (
            SELECT 
                user, 
                COUNT(DISTINCT DATE(beginning)) AS distinct_day
            FROM total_sessions
            GROUP BY user
        ),
        end_days AS (
            SELECT 
                user, 
                DATE(beginning) AS day, 
                MAX(TIME(end)) AS last_connection_time
            FROM total_sessions
            GROUP BY user, DATE(beginning)
            HAVING last_connection_time BETWEEN '17:00:00' AND '20:00:00'
        ),
        end_day_counts AS (
            SELECT 
                user, 
                COUNT(*) AS end_day_count
            FROM end_days
            GROUP BY user
        ),
        qualified_users AS (
            SELECT 
                td.user,
                distinct_day
            FROM total_days td
            JOIN end_day_counts ed ON td.user = ed.user
            WHERE ed.end_day_count * 1.0 / td.distinct_day >= 0.8
        )
        SELECT *
        FROM qualified_users;
    index: user
    columns: ["distinct_day"]

