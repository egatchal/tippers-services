# -- On 80% of connected days, the user is connected to 3–5 unique rooms with ≥ 10 minutes per room, and at least 1 is a faculty office. (Works)
faculty_unique_rooms_query: 
    label: FACULTY
    query: |
        WITH total_sessions AS (
            SELECT * 
            FROM user_location_trajectory_FINE_V2
            WHERE user IN ({users_str})
        ),
        total_connected_days AS (
            SELECT 
                user,
                COUNT(DISTINCT DATE(beginning)) AS total_day_count
            FROM total_sessions
            GROUP BY user
        ),
        unique_rooms_per_day AS (
            SELECT 
                user,
                DATE(beginning) AS day, 
                space_id, 
                SUM(TIMESTAMPDIFF(MINUTE, beginning, end)) AS total_minutes
            FROM total_sessions
            GROUP BY user, DATE(beginning), space_id
            HAVING total_minutes >= 10
        ),
        three_to_five_rooms AS (
            SELECT 
                user, 
                day
            FROM unique_rooms_per_day
            GROUP BY user, day
            HAVING COUNT(DISTINCT space_id) BETWEEN 3 AND 5
        ),
        faculty_office AS (
            SELECT 
                u.user, 
                u.day
            FROM unique_rooms_per_day u
            JOIN space s ON u.space_id = s.space_id
            JOIN faculty_data f ON s.building_room = f.office 
            GROUP BY u.user, u.day
        ),
        both_conditions AS (
            SELECT 
                t.user, 
                t.day
            FROM three_to_five_rooms t
            JOIN faculty_office f 
                ON t.user = f.user AND t.day = f.day
        ),
        qualified_users AS (
            SELECT 
                td.user,
                q.qualified_days, 
                td.total_day_count
            FROM total_connected_days td
            JOIN (
                SELECT user, COUNT(*) AS qualified_days
                FROM both_conditions
                GROUP BY user
            ) q ON td.user = q.user
            WHERE q.qualified_days * 1.0 / td.total_day_count >= 0.8
        )
        SELECT * 
        FROM qualified_users;
    index: user
    columns: ["qualified_days", "total_day_count"]

